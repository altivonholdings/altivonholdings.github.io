<!DOCTYPE html>
<html lang="en">
<head>

  <title>GST Calculator – Professional Zone | Altivon Holdings</title>
  <meta name="description" content="Free online GST calculator for Indian businesses. Calculate CGST, SGST, IGST with ease.">
  <link rel="canonical" href="https://altivonholdings.github.io/professional-zone/gst-calculator.html">
  
  <meta property="og:title" content="GST Calculator – Professional Zone | Altivon Holdings">
  <meta property="og:description" content="Simple and accurate GST calculator for all tax rates.">
  <meta property="og:image" content="https://altivonholdings.github.io/assets/images/logo.jpg">

  <link rel="stylesheet" href="../css/layout.css">

  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    .calculator-card {
      max-width: 700px;
      margin: 3rem auto;
      background: white;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
    }
    .calc-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .calc-row label {
      min-width: 120px;
      font-weight: 600;
      color: var(--navy);
    }
    .calc-row input, .calc-row select {
      flex: 1;
      padding: 0.8rem 1rem;
      border: 1px solid var(--grey-mid);
      border-radius: 12px;
      font-size: 1rem;
    }
    .radio-group {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: normal;
    }
    .result-box {
      background: var(--grey-light);
      border-radius: 20px;
      padding: 1.5rem;
      margin-top: 2rem;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid #ddd;
    }
    .result-row:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--navy);
    }
    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .toggle-switch button {
      background: white;
      border: 2px solid var(--navy);
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-switch button.active {
      background: var(--navy);
      color: white;
    }
  </style>
</head>
<body>
  <!-- Header (static fallback) -->
  <header class="site-header">(same as invoice page – include for brevity, but actual code should have full header)</header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1><i class="fas fa-calculator"></i> GST Calculator</h1>
        <p>Quickly compute CGST, SGST, IGST for any amount</p>
      </div>
    </section>

    <div class="container">
      <div class="calculator-card">
        <div class="toggle-switch">
          <button id="modeExclusive" class="active">Exclusive (Amount + GST)</button>
          <button id="modeInclusive">Inclusive (Amount includes GST)</button>
        </div>

        <div class="calc-row">
          <label>Amount (₹)</label>
          <input type="number" id="amount" value="10000" step="0.01" min="0">
        </div>

        <div class="calc-row">
          <label>GST Rate (%)</label>
          <select id="gstRate">
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18" selected>18%</option>
            <option value="28">28%</option>
            <option value="custom">Custom</option>
          </select>
          <input type="number" id="customRate" value="18" step="0.1" min="0" style="display:none; width:100px;">
        </div>

        <div class="calc-row">
          <label>Tax Type</label>
          <div class="radio-group">
            <label><input type="radio" name="taxType" value="intra" checked> Intra-state (CGST+SGST)</label>
            <label><input type="radio" name="taxType" value="inter"> Inter-state (IGST)</label>
          </div>
        </div>

        <div class="result-box" id="resultBox">
          <div class="result-row">
            <span>Taxable Amount</span>
            <span id="taxableAmount">₹10,000.00</span>
          </div>
          <div class="result-row" id="cgstRow">
            <span>CGST (9%)</span>
            <span id="cgst">₹900.00</span>
          </div>
          <div class="result-row" id="sgstRow">
            <span>SGST (9%)</span>
            <span id="sgst">₹900.00</span>
          </div>
          <div class="result-row" id="igstRow" style="display:none;">
            <span>IGST (18%)</span>
            <span id="igst">₹1,800.00</span>
          </div>
          <div class="result-row">
            <span>Total</span>
            <span id="total">₹11,800.00</span>
          </div>
        </div>

        <p style="text-align:center; margin-top:2rem;"><a href="index.html">← Back to Professional Zone</a></p>
      </div>
    </div>
  </main>

  <!-- Footer (static fallback) same as before -->

  <button class="back-to-top">↑</button>

  <script src="../js/main.js"></script>
  <script src="../js/chat.js"></script>

  <script>
    (function() {
      const amountInput = document.getElementById('amount');
      const gstRateSelect = document.getElementById('gstRate');
      const customRateInput = document.getElementById('customRate');
      const taxTypeRadios = document.getElementsByName('taxType');
      const modeExclusive = document.getElementById('modeExclusive');
      const modeInclusive = document.getElementById('modeInclusive');
      
      const taxableSpan = document.getElementById('taxableAmount');
      const cgstSpan = document.getElementById('cgst');
      const sgstSpan = document.getElementById('sgst');
      const igstSpan = document.getElementById('igst');
      const totalSpan = document.getElementById('total');
      const cgstRow = document.getElementById('cgstRow');
      const sgstRow = document.getElementById('sgstRow');
      const igstRow = document.getElementById('igstRow');

      let mode = 'exclusive'; // or 'inclusive'
      let gstRate = 18;

      function formatCurrency(val) {
        return '₹' + val.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
      }

      function calculate() {
        let amount = parseFloat(amountInput.value) || 0;
        let rate = gstRate;
        
        if (gstRateSelect.value === 'custom') {
          rate = parseFloat(customRateInput.value) || 0;
        }

        let taxable, cgst, sgst, igst, total;

        if (mode === 'exclusive') {
          taxable = amount;
          const gstAmount = taxable * rate / 100;
          if (document.querySelector('input[name="taxType"]:checked').value === 'intra') {
            cgst = sgst = gstAmount / 2;
            igst = 0;
            total = taxable + gstAmount;
          } else {
            igst = gstAmount;
            cgst = sgst = 0;
            total = taxable + gstAmount;
          }
        } else { // inclusive
          total = amount;
          const gstAmount = total * rate / (100 + rate);
          taxable = total - gstAmount;
          if (document.querySelector('input[name="taxType"]:checked').value === 'intra') {
            cgst = sgst = gstAmount / 2;
            igst = 0;
          } else {
            igst = gstAmount;
            cgst = sgst = 0;
          }
        }

        // Update UI
        taxableSpan.innerText = formatCurrency(taxable);
        if (cgst !== undefined) {
          cgstSpan.innerText = formatCurrency(cgst);
          sgstSpan.innerText = formatCurrency(sgst);
          igstSpan.innerText = formatCurrency(igst);
          cgstRow.style.display = 'flex';
          sgstRow.style.display = 'flex';
          igstRow.style.display = 'none';
        } else {
          igstSpan.innerText = formatCurrency(igst);
          cgstRow.style.display = 'none';
          sgstRow.style.display = 'none';
          igstRow.style.display = 'flex';
        }
        totalSpan.innerText = formatCurrency(total);
      }

      // Event listeners
      amountInput.addEventListener('input', calculate);
      gstRateSelect.addEventListener('change', () => {
        if (gstRateSelect.value === 'custom') {
          customRateInput.style.display = 'inline-block';
          gstRate = parseFloat(customRateInput.value) || 0;
        } else {
          customRateInput.style.display = 'none';
          gstRate = parseFloat(gstRateSelect.value);
        }
        calculate();
      });
      customRateInput.addEventListener('input', () => {
        if (gstRateSelect.value === 'custom') {
          gstRate = parseFloat(customRateInput.value) || 0;
          calculate();
        }
      });
      taxTypeRadios.forEach(radio => radio.addEventListener('change', calculate));

      modeExclusive.addEventListener('click', () => {
        modeExclusive.classList.add('active');
        modeInclusive.classList.remove('active');
        mode = 'exclusive';
        calculate();
      });
      modeInclusive.addEventListener('click', () => {
        modeInclusive.classList.add('active');
        modeExclusive.classList.remove('active');
        mode = 'inclusive';
        calculate();
      });

      // Initial calculation
      calculate();
    })();
  </script>
</body>
</html>
