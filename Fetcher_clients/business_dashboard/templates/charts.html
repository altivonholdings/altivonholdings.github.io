{% extends 'base.html' %}

{% block content %}
<h1>Interactive Charts</h1>

<!-- Filter Sidebar (same as data page) -->
<div class="row">
    <div class="col-md-3">
        <div class="card">
            <div class="card-header">Filter Data</div>
            <div class="card-body">
                <form method="get" action="/charts">
                    <div class="mb-2">
                        <label>Category</label>
                        <select name="category" class="form-select">
                            <option value="">All</option>
                            {% for cat in categories %}
                            <option value="{{ cat }}" {% if filters.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Location</label>
                        <select name="location" class="form-select">
                            <option value="">All</option>
                            {% for loc in locations %}
                            <option value="{{ loc }}" {% if filters.get('location') == loc %}selected{% endif %}>{{ loc }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Min Rating</label>
                        <input type="number" step="0.1" name="min_rating" class="form-control" value="{{ filters.get('min_rating', '') }}">
                    </div>
                    <div class="mb-2">
                        <label>Has Phone?</label>
                        <select name="has_phone" class="form-select">
                            <option value="">Any</option>
                            <option value="yes" {% if filters.get('has_phone') == 'yes' %}selected{% endif %}>Yes</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Has Website?</label>
                        <select name="has_website" class="form-select">
                            <option value="">Any</option>
                            <option value="yes" {% if filters.get('has_website') == 'yes' %}selected{% endif %}>Yes</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Charts</button>
                    <a href="/charts" class="btn btn-secondary w-100 mt-1">Reset</a>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-9">
        <div class="row">
            {% for key, chart_json in charts_html.items() %}
            <div class="col-md-6 mb-4">
                <div id="{{ key }}" class="chart"></div>
                <script>
                    var plotData = {{ chart_json|safe }};
                    Plotly.newPlot('{{ key }}', plotData.data, plotData.layout);
                </script>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
